<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .grid2048 {
        display: grid;
        grid-template-columns: repeat(4, 76px);
        gap: 8px;
        background: #263056;
        padding: 8px;
        border-radius: 12px;
        width: max-content;
      }

      .tile {
        width: 76px;
        height: 76px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 22px;
        color: #fff;
        background: #34406f;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h1>🔢 2048</h1>
        <a class="link-btn" href="./index.html">返回首页</a>
      </div>

      <div class="panel row">
        <span>分数：<strong id="score">0</strong></span>
        <button id="restartBtn">重新开始</button>
      </div>

      <div class="panel">
        <div id="grid" class="grid2048"></div>
        <p id="status" class="status">使用方向键（↑↓←→）移动。</p>
      </div>
    </div>

    <script>
      const gridEl = document.getElementById('grid');
      const scoreEl = document.getElementById('score');
      const statusEl = document.getElementById('status');
      const restartBtn = document.getElementById('restartBtn');

      let board = [];
      let score = 0;
      let ended = false;

      function emptyCells() {
        const cells = [];
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (board[r][c] === 0) cells.push([r, c]);
          }
        }
        return cells;
      }

      function addRandomTile() {
        const cells = emptyCells();
        if (!cells.length) return;
        const [r, c] = cells[Math.floor(Math.random() * cells.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
      }

      function colorOf(v) {
        const map = {
          0: '#34406f',
          2: '#5b6fae',
          4: '#6a80c5',
          8: '#7c6dd4',
          16: '#8c63da',
          32: '#a45fd9',
          64: '#c35acc',
          128: '#e15bad',
          256: '#eb6b86',
          512: '#f08a5d',
          1024: '#f7b267',
          2048: '#ffd166'
        };
        return map[v] || '#f94144';
      }

      function render() {
        gridEl.innerHTML = '';
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            const v = board[r][c];
            const div = document.createElement('div');
            div.className = 'tile';
            div.textContent = v === 0 ? '' : String(v);
            div.style.background = colorOf(v);
            div.style.color = v >= 128 ? '#2a1b00' : '#fff';
            gridEl.appendChild(div);
          }
        }
        scoreEl.textContent = String(score);
      }

      function compress(row) {
        const filtered = row.filter((n) => n !== 0);
        for (let i = 0; i < filtered.length - 1; i++) {
          if (filtered[i] === filtered[i + 1]) {
            filtered[i] *= 2;
            score += filtered[i];
            filtered[i + 1] = 0;
          }
        }
        const merged = filtered.filter((n) => n !== 0);
        while (merged.length < 4) merged.push(0);
        return merged;
      }

      function rotateRight(mat) {
        const res = Array.from({ length: 4 }, () => Array(4).fill(0));
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            res[c][3 - r] = mat[r][c];
          }
        }
        return res;
      }

      function rotateLeft(mat) {
        const res = Array.from({ length: 4 }, () => Array(4).fill(0));
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            res[3 - c][r] = mat[r][c];
          }
        }
        return res;
      }

      function clone(mat) {
        return mat.map((row) => [...row]);
      }

      function moveLeft() {
        const old = JSON.stringify(board);
        board = board.map((row) => compress(row));
        return old !== JSON.stringify(board);
      }

      function move(dir) {
        if (ended) return;
        let moved = false;
        if (dir === 'left') moved = moveLeft();
        if (dir === 'right') {
          board = board.map((r) => r.reverse());
          moved = moveLeft();
          board = board.map((r) => r.reverse());
        }
        if (dir === 'up') {
          board = rotateLeft(board);
          moved = moveLeft();
          board = rotateRight(board);
        }
        if (dir === 'down') {
          board = rotateRight(board);
          moved = moveLeft();
          board = rotateLeft(board);
        }

        if (moved) addRandomTile();
        render();
        checkState();
      }

      function hasMoves() {
        if (emptyCells().length) return true;
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            const v = board[r][c];
            if (r < 3 && board[r + 1][c] === v) return true;
            if (c < 3 && board[r][c + 1] === v) return true;
          }
        }
        return false;
      }

      function checkState() {
        for (const row of board) {
          if (row.includes(2048)) {
            statusEl.textContent = '你达成 2048！继续冲高分吧！';
            statusEl.className = 'status success';
            return;
          }
        }
        if (!hasMoves()) {
          ended = true;
          statusEl.textContent = '游戏结束，已无可移动位置。';
          statusEl.className = 'status danger';
        }
      }

      function init() {
        board = Array.from({ length: 4 }, () => Array(4).fill(0));
        score = 0;
        ended = false;
        statusEl.textContent = '使用方向键（↑↓←→）移动。';
        statusEl.className = 'status';
        addRandomTile();
        addRandomTile();
        render();
      }

      document.addEventListener('keydown', (e) => {
        const map = {
          ArrowLeft: 'left',
          ArrowRight: 'right',
          ArrowUp: 'up',
          ArrowDown: 'down'
        };
        const dir = map[e.key];
        if (!dir) return;
        e.preventDefault();
        move(dir);
      });

      restartBtn.addEventListener('click', init);
      init();
    </script>
  </body>
</html>
