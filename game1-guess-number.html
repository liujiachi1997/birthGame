<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>猜数字</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .gift-modal {
        position: fixed;
        inset: 0;
        background: rgba(10, 6, 24, 0.65);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 999;
      }
      .gift-modal.show { display: flex; }
      .gift-modal-card {
        width: min(460px, 92vw);
        background: linear-gradient(180deg, #3b246d 0%, #26154a 100%);
        border: 1px solid #8d70d6;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 16px 40px rgba(18, 10, 40, 0.45);
      }
      .gift-modal-card h3 { margin-bottom: 10px; }
      .gift-modal-card p { color: #e9ddff; line-height: 1.7; }
      .gift-modal-card .hint { color: #cbbdf4; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h1>🎯 猜数字</h1>
        <a class="link-btn" href="./index.html">返回首页</a>
      </div>

      <div class="panel">
        <p>我已经想好了一个 <strong>1~100</strong> 的整数，来猜猜看。</p>
        <div class="row">
          <input id="guessInput" type="number" min="1" max="100" placeholder="输入数字" />
          <button id="guessBtn">提交猜测</button>
          <button id="restartBtn">重新开始</button>
        </div>
      </div>

      <div class="panel">
        <p>尝试次数：<strong id="count">0</strong></p>
        <p class="status" id="message">开始吧！</p>
      </div>
    </div>

    <!-- 礼物弹窗 -->
    <div id="giftModal" class="gift-modal" role="dialog" aria-modal="true">
      <div class="gift-modal-card">
        <h3>🎁 挑战成功！</h3>
        <p>你猜对了！礼物藏在：<strong>【北门】</strong>，快去找找看 ❤️</p>
        <p class="hint">提示：鞋柜</p>
        <button id="closeModalBtn">我知道啦</button>
      </div>
    </div>

    <script>
      let target = Math.floor(Math.random() * 100) + 1;
      let count = 0;
      let finished = false;

      const guessInput = document.getElementById('guessInput');
      const guessBtn = document.getElementById('guessBtn');
      const restartBtn = document.getElementById('restartBtn');
      const countEl = document.getElementById('count');
      const messageEl = document.getElementById('message');
      const giftModalEl = document.getElementById('giftModal');
      const closeModalBtn = document.getElementById('closeModalBtn');

      function showGiftModal() { giftModalEl.classList.add('show'); }
      function hideGiftModal() { giftModalEl.classList.remove('show'); }

      function setMessage(text, cls) {
        messageEl.textContent = text;
        messageEl.className = 'status ' + (cls || '');
      }

      function guess() {
        if (finished) return;

        const value = Number(guessInput.value);
        if (!value || value < 1 || value > 100) {
          setMessage('请输入 1~100 的有效数字。', 'warning');
          return;
        }

        count += 1;
        countEl.textContent = String(count);

        if (value === target) {
          setMessage('恭喜你猜对了！🎉', 'success');
          finished = true;
          showGiftModal();
          return;
        }

        if (value < target) {
          setMessage('小了，再试试。', 'warning');
        } else {
          setMessage('大了，再试试。', 'warning');
        }
      }

      function restart() {
        target = Math.floor(Math.random() * 100) + 1;
        count = 0;
        finished = false;
        countEl.textContent = '0';
        guessInput.value = '';
        setMessage('已重置，继续挑战！', '');
        hideGiftModal();
        guessInput.focus();
      }

      guessBtn.addEventListener('click', guess);
      restartBtn.addEventListener('click', restart);
      closeModalBtn.addEventListener('click', hideGiftModal);
      giftModalEl.addEventListener('click', e => {
        if (e.target === giftModalEl) hideGiftModal();
      });
      guessInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') guess();
      });
    </script>
  </body>
</html>
