<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .gift-modal {
        position: fixed;
        inset: 0;
        background: rgba(10, 6, 24, 0.65);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 999;
      }
      .gift-modal.show { display: flex; }
      .gift-modal-card {
        width: min(460px, 92vw);
        background: linear-gradient(180deg, #3b246d 0%, #26154a 100%);
        border: 1px solid #8d70d6;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 16px 40px rgba(18, 10, 40, 0.45);
      }
      .gift-modal-card h3 { margin-bottom: 10px; }
      .gift-modal-card p { color: #e9ddff; line-height: 1.7; }
      .gift-modal-card .hint { color: #cbbdf4; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h1>🐍 贪吃蛇</h1>
        <a class="link-btn" href="./index.html">返回首页</a>
      </div>

      <div class="panel row">
        <span>得分：<strong id="score">0</strong></span>
        <button id="restartBtn">重新开始</button>
      </div>

      <div class="panel">
        <canvas id="canvas" width="420" height="420"></canvas>
        <p id="status" class="status">方向键控制移动，避免撞墙或撞到自己。</p>
        <p class="footer-note">🎯 挑战目标：得分超过 9 分</p>
      </div>
    </div>

    <!-- 礼物弹窗 -->
    <div id="giftModal" class="gift-modal" role="dialog" aria-modal="true">
      <div class="gift-modal-card">
        <h3>🎁 挑战成功！</h3>
        <p>贪吃蛇高手！礼物藏在：<strong>【厨房】</strong>，快去找找看 ❤️</p>
        <p class="hint">提示：抬头</p>
        <button id="closeModalBtn">我知道啦</button>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const statusEl = document.getElementById('status');
      const restartBtn = document.getElementById('restartBtn');
      const giftModalEl = document.getElementById('giftModal');
      const closeModalBtn = document.getElementById('closeModalBtn');

      const CHALLENGE_SCORE = 9;

      const size = 21;
      const cell = 20;
      let snake = [];
      let dir = { x: 1, y: 0 };
      let nextDir = { x: 1, y: 0 };
      let food = { x: 10, y: 10 };
      let score = 0;
      let timer = null;
      let ended = false;

      function placeFood() {
        while (true) {
          const x = Math.floor(Math.random() * size);
          const y = Math.floor(Math.random() * size);
          if (!snake.some((s) => s.x === x && s.y === y)) {
            food = { x, y };
            return;
          }
        }
      }

      function drawCell(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * cell, y * cell, cell - 1, cell - 1);
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let x = 0; x < size; x++) {
          for (let y = 0; y < size; y++) {
            drawCell(x, y, '#0d1430');
          }
        }

        drawCell(food.x, food.y, '#c084fc');
        snake.forEach((part, i) => drawCell(part.x, part.y, i === 0 ? '#a78bfa' : '#7c5ae0'));
      }

      function step() {
        if (ended) return;

        dir = nextDir;
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        if (head.x < 0 || head.x >= size || head.y < 0 || head.y >= size) {
          gameOver('撞墙了，游戏结束。');
          return;
        }

        if (snake.some((s) => s.x === head.x && s.y === head.y)) {
          gameOver('撞到自己了，游戏结束。');
          return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
          score += 1;
          scoreEl.textContent = String(score);
          placeFood();
        } else {
          snake.pop();
        }

        render();
      }

      function gameOver(text) {
        ended = true;
        clearInterval(timer);
        if (score > CHALLENGE_SCORE) {
          statusEl.textContent = `${text} 最终得分 ${score} 分，挑战成功！🎉`;
          statusEl.className = 'status success';
          giftModalEl.classList.add('show');
        } else {
          statusEl.textContent = `${text} 得分 ${score} 分，需要超过 ${CHALLENGE_SCORE} 分才能通关哦～`;
          statusEl.className = 'status danger';
        }
      }

      function init() {
        clearInterval(timer);
        snake = [
          { x: 5, y: 10 },
          { x: 4, y: 10 },
          { x: 3, y: 10 }
        ];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
        score = 0;
        ended = false;
        scoreEl.textContent = '0';
        statusEl.textContent = '方向键控制移动，避免撞墙或撞到自己。';
        statusEl.className = 'status';
        giftModalEl.classList.remove('show');
        placeFood();
        render();
        timer = setInterval(step, 120);
      }

      document.addEventListener('keydown', (e) => {
        const map = {
          ArrowUp: { x: 0, y: -1 },
          ArrowDown: { x: 0, y: 1 },
          ArrowLeft: { x: -1, y: 0 },
          ArrowRight: { x: 1, y: 0 }
        };
        const d = map[e.key];
        if (!d) return;
        e.preventDefault();
        if (d.x === -dir.x && d.y === -dir.y) return;
        nextDir = d;
      });

      // =========== 触摸滑动支持 ===========
      let touchStartX = 0, touchStartY = 0;

      canvas.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      // 在游戏区域内滑动时阻止页面滚动
      canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);
        if (Math.max(absDx, absDy) < 30) return; // 滑动距离太短不响应
        let d;
        if (absDx > absDy) {
          d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
        } else {
          d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
        }
        // 不允许反向
        if (d.x === -dir.x && d.y === -dir.y) return;
        nextDir = d;
      }, { passive: true });

      restartBtn.addEventListener('click', init);
      closeModalBtn.addEventListener('click', () => giftModalEl.classList.remove('show'));
      giftModalEl.addEventListener('click', e => {
        if (e.target === giftModalEl) giftModalEl.classList.remove('show');
      });
      init();
    </script>
  </body>
</html>
