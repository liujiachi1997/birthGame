<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>记忆翻牌</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .memory-board {
        grid-template-columns: repeat(4, 78px);
      }

      .memory-card {
        width: 78px;
        height: 78px;
        border-radius: 12px;
        border: 1px solid #6f54b6;
        background: #2b1a52;
        color: #fff;
        font-size: 32px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        user-select: none;
      }

      .memory-card.open,
      .memory-card.matched {
        background: #6d4bc3;
      }

      .memory-card.matched {
        outline: 2px solid #d8b4fe;
      }

      .gift-modal {
        position: fixed;
        inset: 0;
        background: rgba(10, 6, 24, 0.65);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
        z-index: 999;
      }
      .gift-modal.show { display: flex; }
      .gift-modal-card {
        width: min(460px, 92vw);
        background: linear-gradient(180deg, #3b246d 0%, #26154a 100%);
        border: 1px solid #8d70d6;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 16px 40px rgba(18, 10, 40, 0.45);
      }
      .gift-modal-card h3 { margin-bottom: 10px; }
      .gift-modal-card p { color: #e9ddff; line-height: 1.7; }
      .gift-modal-card .hint { color: #cbbdf4; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <h1>🃏 记忆翻牌</h1>
        <a class="link-btn" href="./index.html">返回首页</a>
      </div>

      <div class="panel row">
        <span>步数：<strong id="steps">0</strong></span>
        <span>时间：<strong id="time">0</strong> 秒</span>
        <button id="restartBtn">重新开始</button>
      </div>

      <div class="panel">
        <div id="board" class="board memory-board"></div>
        <p id="status" class="status"></p>
        <p class="footer-note">🎯 挑战目标：在 20 步以内 且 60 秒以内完成翻牌</p>
      </div>
    </div>

    <!-- 礼物弹窗 -->
    <div id="giftModal" class="gift-modal" role="dialog" aria-modal="true">
      <div class="gift-modal-card">
        <h3>🎁 挑战成功！</h3>
        <p>翻牌小能手！礼物藏在：<strong>衣柜右边第三层</strong>，快去找找看 ❤️</p>
        <p class="hint">提示：叠好的衣服下面藏着惊喜～</p>
        <button id="closeModalBtn">我知道啦</button>
      </div>
    </div>

    <script>
      const icons = ['🍎', '🍌', '🍇', '🍒', '🍉', '🍍', '🥝', '🍑'];
      const boardEl = document.getElementById('board');
      const stepsEl = document.getElementById('steps');
      const timeEl = document.getElementById('time');
      const statusEl = document.getElementById('status');
      const restartBtn = document.getElementById('restartBtn');
      const giftModalEl = document.getElementById('giftModal');
      const closeModalBtn = document.getElementById('closeModalBtn');

      const MAX_STEPS = 20;
      const MAX_SECONDS = 60;

      let cards = [];
      let first = null;
      let lock = false;
      let steps = 0;
      let matched = 0;
      let seconds = 0;
      let timer = null;

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function startTimer() {
        if (timer) return;
        timer = setInterval(() => {
          seconds += 1;
          timeEl.textContent = String(seconds);
        }, 1000);
      }

      function stopTimer() {
        clearInterval(timer);
        timer = null;
      }

      function render() {
        boardEl.innerHTML = '';
        cards.forEach((card, index) => {
          const div = document.createElement('div');
          div.className = `memory-card ${card.open ? 'open' : ''} ${card.matched ? 'matched' : ''}`;
          div.textContent = card.open || card.matched ? card.icon : '❓';
          div.addEventListener('click', () => flip(index));
          boardEl.appendChild(div);
        });
      }

      function flip(index) {
        const c = cards[index];
        if (lock || c.open || c.matched) return;

        startTimer();
        c.open = true;
        render();

        if (!first) {
          first = index;
          return;
        }

        steps += 1;
        stepsEl.textContent = String(steps);

        const a = cards[first];
        const b = c;

        if (a.icon === b.icon) {
          a.matched = true;
          b.matched = true;
          first = null;
          matched += 1;
          if (matched === icons.length) {
            stopTimer();
            if (steps <= MAX_STEPS && seconds <= MAX_SECONDS) {
              statusEl.textContent = `通关！你用了 ${steps} 步，耗时 ${seconds} 秒。挑战成功 🎉`;
              statusEl.className = 'status success';
              giftModalEl.classList.add('show');
            } else {
              statusEl.textContent = `通关！你用了 ${steps} 步，耗时 ${seconds} 秒。未达成挑战目标，再试一次吧～`;
              statusEl.className = 'status warning';
            }
          }
          render();
        } else {
          lock = true;
          setTimeout(() => {
            a.open = false;
            b.open = false;
            first = null;
            lock = false;
            render();
          }, 700);
        }
      }

      function init() {
        stopTimer();
        const deck = shuffle([...icons, ...icons]);
        cards = deck.map((icon) => ({ icon, open: false, matched: false }));
        first = null;
        lock = false;
        steps = 0;
        matched = 0;
        seconds = 0;
        stepsEl.textContent = '0';
        timeEl.textContent = '0';
        statusEl.textContent = '';
        statusEl.className = 'status';
        giftModalEl.classList.remove('show');
        render();
      }

      restartBtn.addEventListener('click', init);
      closeModalBtn.addEventListener('click', () => giftModalEl.classList.remove('show'));
      giftModalEl.addEventListener('click', e => {
        if (e.target === giftModalEl) giftModalEl.classList.remove('show');
      });
      init();
    </script>
  </body>
</html>
