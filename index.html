<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>六个网页小游戏</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div>
          <h1>🎮 善善小朋友生日大挑战</h1>
          <p class="subtitle">每个小游戏对应一个礼物，完成挑战拿礼物吧！</p>
        </div>
        <span class="badge">made by ruirui</span>
      </div>

      <div class="grid">
        <div class="card">
          <h3>1) 猜数字</h3>
          <p>猜 1~100 的随机数，支持提示和统计。</p>
          <a class="link-btn" href="./game1-guess-number.html">开始游戏</a>
        </div>

        <div class="card">
          <h3>2) 井字棋</h3>
          <p>双人同屏对战，先连成一线者获胜。</p>
          <a class="link-btn" href="./game2-tic-tac-toe.html">开始游戏</a>
        </div>

        <div class="card">
          <h3>3) 记忆翻牌</h3>
          <p>翻开卡片配对，挑战最少步数和最短时间。</p>
          <a class="link-btn" href="./game3-memory.html">开始游戏</a>
        </div>

        <div class="card">
          <h3>4) 2048</h3>
          <p>合并数字冲击高分，键盘方向键操作。</p>
          <a class="link-btn" href="./game4-2048.html">开始游戏</a>
        </div>

        <div class="card">
          <h3>5) 贪吃蛇</h3>
          <p>经典贪吃蛇，吃到食物不断变长。</p>
          <a class="link-btn" href="./game5-snake.html">开始游戏</a>
        </div>

        <div class="card">
          <h3>6) 反应速度测试</h3>
          <p>等待变绿后点击，测你的反应时间。</p>
          <a class="link-btn" href="./game6-reaction.html">开始游戏</a>
        </div>
      </div>

      <p class="footer-note">提示：你可以将每个页面单独部署，拿到6个可分享URL。</p>
    </div>
  </body>
</html>
